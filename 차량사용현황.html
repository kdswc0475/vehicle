<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>차량 사용 현황</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ 가로 최적화: 화면 꽉 채우기 ══ */
    html { height: 100%; overflow: hidden; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #fff;
      padding: 4px 6px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─ 제목 ─ */
    .wrap-title {
      position: relative;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .main-title {
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 10px;
      text-decoration: underline;
      display: inline-block;
      line-height: 1.1;
    }
    .top-notices {
      position: absolute;
      top: 0; right: 0;
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .top-notices span {
      font-size: 11px;
      color: #333;
      line-height: 1.4;
    }
    .top-notices .notice-blue {
      color: #1565c0;
      font-weight: bold;
    }

    /* ─ 주 이동 ─ */
    .week-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin: 4px 0; flex-shrink: 0;
    }
    .week-nav button {
      padding: 4px 14px; font-size: 12px; font-family: inherit;
      border: 1px solid #666; border-radius: 4px;
      background: #f2f2f2; cursor: pointer;
    }
    .btn-today { background:#1565c0!important; color:#fff!important; border-color:#0d47a1!important; }
    #weekLabel { font-size:13px; font-weight:bold; min-width:190px; text-align:center; }

    /* ─ 테이블 래퍼 – 남은 세로 공간 전부 차지 ─ */
    .tbl-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* 테이블이 래퍼 높이 100% 채우기 */
    table {
      border-collapse: collapse;
      width: 100%; min-width: 1200px;
      border: 2px solid #000;
    }
    th, td { border:1px solid #666; text-align:center; vertical-align:middle; padding:0; font-size:11px; }

    .th-date { font-size:14px; font-weight:bold; padding:4px; letter-spacing:1px; }
    .th-today { background:#e3f2fd; color:#0d47a1; }
    .th-sub { font-size:10px; padding:3px 1px; background:#fafafa; }

    /* 컬럼 너비 – 6일×(38+55+55+63)=211px×6=1266px */
    .cV { width:38px; }
    .cT { width:55px; }
    .cU { width:55px; }
    .cR { width:63px; }

    /* 행 높이 calc():
       100vh - (body pad 8 + 제목 35 + 안내 16 + 주이동 40 + thead날짜 25 + thead서브 18 + 테두리 4) ÷ 8행
       = (100vh - 146px) / 8
    */
    .drow { height: calc((100vh - 146px) / 8); }

    /* ─ 운행 중 행 하이라이트 ─ */
    td.time-active {
      background-color: #bbdefb !important;
    }
    td.time-active.cT .time-btn {
      color: #0d47a1 !important;
      font-weight: bold !important;
    }

    /* ─ 차량/사용자 가운데 정렬 ─ */
    select.sel-empty { color:#ccc; }
    select {
      width:100%; border:none; background:transparent;
      font-family:inherit; font-size:10px;
      text-align:center; text-align-last:center;
      outline:none; -webkit-appearance:none; appearance:none;
      padding:2px 0; cursor:pointer;
    }

    /* ─ 시간 셀 버튼 ─ */
    .time-btn {
      width:100%; height:100%; border:none; background:transparent;
      font-family:inherit; font-size:12px; color:#333;
      cursor:pointer; padding:2px 1px; text-align:center;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      line-height:1.4;
    }
    .time-btn.has-val { color:#000; font-weight:bold; }
    .time-btn.empty   { color:#ccc; font-size:10px; }

    /* ─ 비고 셀 ─ */
    .remark-td { padding:0; vertical-align:top; }
    .remark-wrap { display:flex; flex-direction:column; height: calc((100vh - 146px) / 8); }
    .remark-pen {
      flex:1; display:flex; align-items:center; justify-content:center;
      cursor:pointer; overflow:hidden; border-bottom:1px solid #bbb; background:#fff;
    }
    .remark-pen:active { background:#ffffff; }
    .remark-ph { font-size:8px; color:#ccc; pointer-events:none; }
    .remark-incha {
      height:24px; display:flex; align-items:center; justify-content:center;
      gap:3px; font-size:10px;
    }
    .remark-incha input[type="checkbox"] {
      width:15px; height:15px; cursor:pointer; accent-color:#000; flex-shrink:0;
    }

    /* ══════════════════════════════════════
       ─ ② 비고 모달 – 전체화면 새창 스타일 ─
       ══════════════════════════════════════ */
    .fullmodal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.75); z-index:600;
      align-items:center; justify-content:center;
    }
    .fullmodal.open { display:flex; }

    /* 비고 창 */
    .pen-box {
      background:#fff; border-radius:12px;
      width:92vw; max-width:1000px;
      height:88vh;
      padding:20px 24px 18px;
      box-shadow:0 10px 40px rgba(0,0,0,.45);
      display:flex; flex-direction:column; gap:12px;
    }
    .pen-head {
      display:flex; align-items:center; justify-content:space-between;
    }
    .pen-head h2 { font-size:18px; font-weight:bold; }
    .pen-head .pen-info { font-size:12px; color:#777; }

    #cvs {
      display:block; width:100%; flex:1; min-height:0;
      border:2px solid #555; border-radius:6px;
      touch-action:none; cursor:crosshair; background:#fff;
    }
    .pen-toolbar {
      display:flex; align-items:center; gap:10px;
    }
    .tbtn {
      padding:8px 16px; border:1px solid #aaa; border-radius:6px;
      background:#f0f0f0; font-size:13px; font-family:inherit; cursor:pointer;
    }
    .tbtn.on { background:#333; color:#fff; border-color:#333; }
    .remark-text {
      font-size:9px; color:#111; display:block;
      width:100%; padding:2px 3px;
      word-break:break-all; white-space:pre-wrap;
      overflow:hidden; text-align:left;
    }

    .pen-btns {
      display:flex; gap:12px; justify-content:flex-end;
    }
    .pbtn {
      padding:12px 28px; border-radius:7px; font-size:14px;
      font-family:inherit; cursor:pointer; border:none; font-weight:bold;
    }
    .pbtn-clear  { background:#e0e0e0; border:1px solid #aaa; font-weight:normal; }
    .pbtn-cancel { background:#c62828; color:#fff; }
    .pbtn-reset  { background:#f57c00; color:#fff; }
    .pbtn-done   { background:#1565c0; color:#fff; font-size:16px; padding:12px 40px; }

    /* ══════════════════════════════════════
       ─ ③ 시간 다이얼 모달 ─
       ══════════════════════════════════════ */
    .fullmodal.tp-modal .tp-box {
      background:#fff; border-radius:12px;
      width:700px; max-width:94vw;
      padding:22px 28px 20px;
      box-shadow:0 10px 40px rgba(0,0,0,.45);
    }
    .tp-title { font-size:18px; font-weight:bold; margin-bottom:6px; }
    .tp-sub   { font-size:12px; color:#777; margin-bottom:18px; }

    .tp-cols {
      display:flex; gap:30px; justify-content:center; margin-bottom:20px;
    }
    .tp-col { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .tp-col-label { font-size:13px; font-weight:bold; color:#444; margin-bottom:4px; }

    .tp-dials { display:flex; align-items:center; gap:6px; }
    .tp-sep { font-size:28px; font-weight:bold; color:#333; padding-bottom:4px; }

    .dial {
      display:flex; flex-direction:column; align-items:center;
      border:2px solid #bbb; border-radius:10px; overflow:hidden;
      width:72px;
    }
    .dial-up, .dial-dn {
      width:100%; height:52px;
      display:flex; align-items:center; justify-content:center;
      background:#f5f5f5; font-size:22px; cursor:pointer;
      user-select:none; -webkit-user-select:none;
      border:none; font-family:inherit;
    }
    .dial-up:active, .dial-dn:active { background:#ddd; }
    .dial-val {
      width:100%; height:60px;
      display:flex; align-items:center; justify-content:center;
      font-size:30px; font-weight:bold; background:#fff;
      border-top:1px solid #ddd; border-bottom:1px solid #ddd;
      /* input 스타일 */
      border-left:none; border-right:none; border-radius:0;
      text-align:center; outline:none; font-family:inherit;
      -moz-appearance:textfield; padding:0;
    }
    .dial-val::-webkit-inner-spin-button,
    .dial-val::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    .dial-val:focus { background:#ffffff; }

    .tp-preview {
      text-align:center; font-size:22px; font-weight:bold;
      background:#e8f4fd; border-radius:8px; padding:12px;
      color:#1565c0; letter-spacing:2px; margin-bottom:20px;
    }
    .tp-btns { display:flex; gap:12px; justify-content:flex-end; }
    .tpbtn {
      padding:12px 30px; border-radius:7px; font-size:14px;
      font-family:inherit; cursor:pointer; border:none; font-weight:bold;
    }
    .tpbtn-cancel { background:#e0e0e0; border:1px solid #aaa; font-weight:normal; }
    .tpbtn-reset  { background:#f57c00; color:#fff; }
    .tpbtn-done   { background:#2e7d32; color:#fff; font-size:16px; padding:12px 40px; }
  </style>
</head>
<body>

<!-- ─ 제목 ─ -->
<div class="wrap-title">
  <div class="main-title">차 량 사 용 현 황</div>
  <div class="top-notices">
    <span class="notice-blue">🔵 현재 운행 중인 차량은 파란색으로 표시됩니다</span>
    <span>※ 차량 사용 후 비고란 입차 □ 에 √표시하여 차량 입차 확인을 하여 주세요</span>
  </div>
</div>

<!-- ─ 주 이동 ─ -->
<div class="week-nav">
  <button id="btnPrev">◀ 이전 주</button>
  <span id="weekLabel">-</span>
  <button id="btnNext">다음 주 ▶</button>
  <button class="btn-today" id="btnToday">오늘</button>
</div>

<!-- ─ 표 ─ -->
<div class="tbl-wrap">
  <table id="tbl">
    <thead id="tblHead"></thead>
    <tbody id="tblBody"></tbody>
  </table>
</div>

<!-- ══════════════════════════════════
     ② 비고 손글씨 모달 (전체화면 새창)
     ══════════════════════════════════ -->
<div class="fullmodal" id="penModal">
  <div class="pen-box">
    <div class="pen-head">
      <h2>✏️ 비고 작성</h2>
      <span class="pen-info" id="penInfo"></span>
    </div>
    <canvas id="cvs"></canvas>
    <div class="pen-toolbar">
      <button class="tbtn" id="eraser" onclick="pEraser()">지우개</button>
      <button class="tbtn" onclick="cvsClear()">전체 지우기</button>
    </div>
    <div class="pen-btns">
      <button class="pbtn pbtn-cancel" onclick="penClose()">취소</button>
      <button class="pbtn pbtn-reset"  onclick="penReset()">초기화</button>
      <button class="pbtn pbtn-done"   onclick="penSave()">완료</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     ③ 시간 다이얼 모달
     ══════════════════════════════════ -->
<div class="fullmodal tp-modal" id="tpModal">
  <div class="tp-box">
    <div class="tp-title">⏰ 시간 선택</div>
    <div class="tp-sub" id="tpInfo"></div>

    <div class="tp-cols">
      <!-- 출발 -->
      <div class="tp-col">
        <div class="tp-col-label">출 발</div>
        <div class="tp-dials">
          <div class="dial">
            <button class="dial-up" data-id="sh" data-dir="1">▲</button>
            <input class="dial-val" id="dsh" type="number" inputmode="numeric" min="0" max="23">
            <button class="dial-dn" data-id="sh" data-dir="-1">▼</button>
          </div>
          <div class="tp-sep">:</div>
          <div class="dial">
            <button class="dial-up" data-id="sm" data-dir="1">▲</button>
            <input class="dial-val" id="dsm" type="number" inputmode="numeric" min="0" max="55">
            <button class="dial-dn" data-id="sm" data-dir="-1">▼</button>
          </div>
        </div>
      </div>

      <div style="display:flex;align-items:center;font-size:30px;color:#888;padding-top:30px;">~</div>

      <!-- 도착 -->
      <div class="tp-col">
        <div class="tp-col-label">도 착</div>
        <div class="tp-dials">
          <div class="dial">
            <button class="dial-up" data-id="eh" data-dir="1">▲</button>
            <input class="dial-val" id="deh" type="number" inputmode="numeric" min="0" max="23">
            <button class="dial-dn" data-id="eh" data-dir="-1">▼</button>
          </div>
          <div class="tp-sep">:</div>
          <div class="dial">
            <button class="dial-up" data-id="em" data-dir="1">▲</button>
            <input class="dial-val" id="dem" type="number" inputmode="numeric" min="0" max="55">
            <button class="dial-dn" data-id="em" data-dir="-1">▼</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tp-preview" id="tpPreview">09:00 ~ 17:00</div>

    <div class="tp-btns">
      <button class="tpbtn tpbtn-cancel" onclick="tpClose()">취소</button>
      <button class="tpbtn tpbtn-reset"  onclick="tpReset()">초기화</button>
      <button class="tpbtn tpbtn-done"   onclick="tpDone()">완료</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────── 상수 ─────────────────────── */
var VEHICLES = ['', 'M1', 'M2', '스타렉스'];
var USERS = [
  '', '임정백', '박철', '송재우', '김태성', '이성천', '이복희',
  '최희용', '홍예지', '전하영', '전아현', '박은비', '서일배',
  '최수림', '김수빈', '정현주', '김성준', '오기쁨', '이서아', '오영석'
];
var DAYKO = ['월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
var NROWS = 8;
var wOff  = 0;

/* ─────────────────────── 스토리지 ─────────────────── */
function lsGet(k) { try { return localStorage.getItem(k) || ''; } catch(e) { return ''; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch(e) {} }
function skey(dk, r, f) { return 'car|' + dk + '|' + r + '|' + f; }

/* ─────────────────────── 날짜 ─────────────────────── */
function getMonday(d) {
  var t = new Date(d), day = t.getDay();
  t.setDate(t.getDate() + (day === 0 ? 1 : 1 - day));
  t.setHours(0,0,0,0);
  return t;
}
function weekDates(off) {
  var mon = getMonday(new Date());
  mon.setDate(mon.getDate() + off * 7);
  var arr = [];
  for (var i = 0; i < 6; i++) { var d = new Date(mon); d.setDate(mon.getDate()+i); arr.push(d); }
  return arr;
}
function fmt(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
function dkey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isToday(d) {
  var t=new Date();
  return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();
}

/* ─────────────────────── 테이블 빌드 ─────────────── */
function buildTable() {
  var dates = weekDates(wOff);
  document.getElementById('weekLabel').textContent =
    dates[0].getFullYear()+'년  '+fmt(dates[0])+' ~ '+fmt(dates[5]);

  var thead = document.getElementById('tblHead');
  while (thead.firstChild) thead.removeChild(thead.firstChild);

  var tr0 = document.createElement('tr');
  for (var di=0; di<6; di++) {
    var th0=document.createElement('th'); th0.colSpan=4;
    th0.className='th-date'+(isToday(dates[di])?' th-today':'');
    th0.textContent=fmt(dates[di])+' ('+DAYKO[di]+')';
    tr0.appendChild(th0);
  }
  thead.appendChild(tr0);

  var tr1=document.createElement('tr');
  var sLbls=['차  량','시  간','사용자','비  고'], sCls=['cV','cT','cU','cR'];
  for (var di2=0; di2<6; di2++) {
    for (var ci=0; ci<4; ci++) {
      var th1=document.createElement('th');
      th1.className='th-sub '+sCls[ci]; th1.textContent=sLbls[ci]; tr1.appendChild(th1);
    }
  }
  thead.appendChild(tr1);

  var tbody=document.getElementById('tblBody');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  for (var r=0; r<NROWS; r++) {
    var tr=document.createElement('tr'); tr.className='drow';
    for (var di3=0; di3<6; di3++) {
      var dk=dkey(dates[di3]);

      /* 차량 */
      var tdV=document.createElement('td'); tdV.className='cV';
      tdV.dataset.dk=dk; tdV.dataset.r=r;
      tdV.appendChild(makeSelect(VEHICLES, lsGet(skey(dk,r,'v')), skey(dk,r,'v')));
      tr.appendChild(tdV);

      /* ③ 시간 – 다이얼 버튼 */
      var tdT=document.createElement('td'); tdT.className='cT';
      tdT.dataset.dk=dk; tdT.dataset.r=r;
      tdT.appendChild(makeTimeBtn(dk,r,di3));
      tr.appendChild(tdT);

      /* 사용자 */
      var tdU=document.createElement('td'); tdU.className='cU';
      tdU.dataset.dk=dk; tdU.dataset.r=r;
      tdU.appendChild(makeSelect(USERS, lsGet(skey(dk,r,'u')), skey(dk,r,'u')));
      tr.appendChild(tdU);

      /* 비고 */
      tr.appendChild(makeRemarkCell(dk,r,di3));
    }
    tbody.appendChild(tr);
  }
}

function makeSelect(opts, cur, key) {
  var sel=document.createElement('select');
  for (var i=0; i<opts.length; i++) {
    var op=document.createElement('option');
    op.value=opts[i]; op.textContent=opts[i]==='' ? '클릭' : opts[i];
    if (opts[i]===cur) op.selected=true;
    sel.appendChild(op);
  }
  var sep=document.createElement('option'); sep.disabled=true; sep.textContent='─────────'; sel.appendChild(sep);
  var rst=document.createElement('option'); rst.value='__rst__'; rst.textContent='초기화'; sel.appendChild(rst);
  if (!cur) sel.classList.add('sel-empty');
  (function(k){ sel.addEventListener('change', function(){
    if (this.value==='__rst__') { this.value=''; lsDel(k); }
    else lsSet(k, this.value);
    this.value==='' ? this.classList.add('sel-empty') : this.classList.remove('sel-empty');
  }); })(key);
  return sel;
}

/* ③ 시간 버튼 */
function fmtTimeBtnHtml(val) {
  if (!val) return '클릭';
  var p=val.split('~');
  return p.length===2 ? p[0]+'<br>—<br>'+p[1] : val;
}

function makeTimeBtn(dk, r, di) {
  var btn=document.createElement('button');
  btn.className='time-btn';
  var val=lsGet(skey(dk,r,'t'));
  btn.innerHTML = val ? fmtTimeBtnHtml(val) : '클릭';
  btn.classList.add(val ? 'has-val' : 'empty');
  btn.dataset.dk=dk; btn.dataset.r=r; btn.dataset.di=di;
  btn.addEventListener('click', (function(pdk,pr,pdi){
    return function(){ tpOpen(pdk,pr,pdi); };
  })(dk,r,di));
  return btn;
}

function refreshRemark(dk2, r2) {
  document.querySelectorAll('.remark-pen').forEach(function(pen) {
    if (pen.dataset.dk===dk2 && parseInt(pen.dataset.r)===r2) {
      var imgVal=lsGet(skey(dk2,r2,'img'));
      pen.innerHTML='';
      if (imgVal) {
        var img=document.createElement('img'); img.src=imgVal;
        img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;';
        pen.appendChild(img);
      } else {
        var ph=document.createElement('span'); ph.className='remark-ph'; ph.textContent='클릭'; pen.appendChild(ph);
      }
    }
  });
}

function makeRemarkCell(dk, r, di) {
  var td=document.createElement('td'); td.className='remark-td cR';
  td.dataset.dk=dk; td.dataset.r=r;
  var wrap=document.createElement('div'); wrap.className='remark-wrap';

  var pen=document.createElement('div'); pen.className='remark-pen';
  pen.dataset.dk=dk; pen.dataset.r=r; pen.dataset.di=di;
  var imgVal=lsGet(skey(dk,r,'img'));
  if (imgVal) {
    var img=document.createElement('img'); img.src=imgVal;
    img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;';
    pen.appendChild(img);
  } else {
    var ph=document.createElement('span'); ph.className='remark-ph'; ph.textContent='클릭'; pen.appendChild(ph);
  }
  pen.addEventListener('click', (function(pdk,pr,pdi){ return function(){ penOpen(pdk,pr,pdi); }; })(dk,r,di));

  wrap.appendChild(pen);

  var incha=document.createElement('div'); incha.className='remark-incha';
  incha.appendChild(document.createTextNode('입차'));
  var chk=document.createElement('input'); chk.type='checkbox';
  chk.checked=(lsGet(skey(dk,r,'i'))==='true');
  (function(k){ chk.addEventListener('change', function(){ lsSet(k, this.checked?'true':'false'); highlightActive(); }); })(skey(dk,r,'i'));
  incha.appendChild(chk);
  wrap.appendChild(incha);

  td.appendChild(wrap);
  return td;
}

/* ─────────────────────── 주 이동 ─────────────────── */
document.getElementById('btnPrev').addEventListener('click', function(){ wOff--; buildTable(); });
document.getElementById('btnNext').addEventListener('click', function(){ wOff++; buildTable(); });
document.getElementById('btnToday').addEventListener('click', function(){ wOff=0; buildTable(); });

/* ══════════════════════════════════════════════════
   ② 비고 손글씨→OCR 모달
   ══════════════════════════════════════════════════ */
var penDk=null, penR=null, penDi=null;
var isDrawing=false, lastX=0, lastY=0;
var eraserOn=false;
var cvs=document.getElementById('cvs');
var ctx=cvs.getContext('2d');

function penOpen(dk, r, di) {
  penDk=dk; penR=r; penDi=di;
  document.getElementById('penModal').classList.add('open');
  var dates=weekDates(wOff);
  document.getElementById('penInfo').textContent=
    fmt(dates[di])+' ('+DAYKO[di]+') — '+(r+1)+'번째 줄';
  document.getElementById('eraser').classList.remove('on');
  eraserOn=false;
  setTimeout(function(){
    var rect=cvs.getBoundingClientRect();
    cvs.width=Math.max(Math.round(rect.width),400);
    cvs.height=Math.max(Math.round(rect.height),200);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
    var saved=lsGet(skey(dk,r,'img'));
    if (saved) { var i2=new Image(); i2.onload=function(){ ctx.drawImage(i2,0,0,cvs.width,cvs.height); }; i2.src=saved; }
    applyPen();
  }, 60);
}

function penClose() { document.getElementById('penModal').classList.remove('open'); }

function applyPen() {
  ctx.strokeStyle=eraserOn?'#fff':'#111';
  ctx.lineWidth=eraserOn?28:5;
  ctx.lineCap='round'; ctx.lineJoin='round';
}
function cvsClear() {
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
}
function pEraser() {
  eraserOn=!eraserOn;
  document.getElementById('eraser').classList.toggle('on',eraserOn);
  applyPen();
}

function getPos(e) {
  var rect=cvs.getBoundingClientRect();
  var sx=cvs.width/rect.width, sy=cvs.height/rect.height;
  var cx,cy;
  if (e.touches&&e.touches.length){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
  else if (e.changedTouches&&e.changedTouches.length){ cx=e.changedTouches[0].clientX; cy=e.changedTouches[0].clientY; }
  else { cx=e.clientX; cy=e.clientY; }
  return [(cx-rect.left)*sx,(cy-rect.top)*sy];
}
cvs.addEventListener('mousedown',  function(e){ isDrawing=true; var p=getPos(e); lastX=p[0]; lastY=p[1]; ctx.beginPath(); ctx.moveTo(lastX,lastY); });
cvs.addEventListener('mousemove',  function(e){ if(!isDrawing)return; var p=getPos(e); ctx.lineTo(p[0],p[1]); ctx.stroke(); lastX=p[0]; lastY=p[1]; });
cvs.addEventListener('mouseup',    function(){ isDrawing=false; ctx.beginPath(); });
cvs.addEventListener('mouseleave', function(){ isDrawing=false; ctx.beginPath(); });
cvs.addEventListener('touchstart', function(e){ e.preventDefault(); isDrawing=true; var p=getPos(e); lastX=p[0]; lastY=p[1]; ctx.beginPath(); ctx.moveTo(lastX,lastY); },{passive:false});
cvs.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!isDrawing)return; var p=getPos(e); ctx.lineTo(p[0],p[1]); ctx.stroke(); lastX=p[0]; lastY=p[1]; },{passive:false});
cvs.addEventListener('touchend',   function(e){ e.preventDefault(); isDrawing=false; ctx.beginPath(); },{passive:false});

function penSave() {
  var url=cvs.toDataURL('image/png');
  lsSet(skey(penDk,penR,'img'), url);
  refreshRemark(penDk, penR);
  penClose();
}
function penReset() {
  cvsClear();
  lsDel(skey(penDk,penR,'img'));
  refreshRemark(penDk, penR);
  penClose();
}

/* ══════════════════════════════════════════════════
   ③ 시간 다이얼 모달
   ══════════════════════════════════════════════════ */
var tpDk=null, tpR=null, tpDi=null;
var tpVals = { sh:9, sm:0, eh:17, em:0 };
var repeatTimer=null, repeatInterval=null;

function tpOpen(dk, r, di) {
  tpDk=dk; tpR=r; tpDi=di;
  var saved=lsGet(skey(dk,r,'t'));
  /* 저장값 파싱: "09:00~17:00" */
  var sh=9, sm=0, eh=17, em=0;
  if (saved) {
    var m=saved.match(/(\d{1,2}):(\d{2})~(\d{1,2}):(\d{2})/);
    if (m) { sh=parseInt(m[1]); sm=parseInt(m[2]); eh=parseInt(m[3]); em=parseInt(m[4]); }
  }
  tpVals={sh:sh,sm:sm,eh:eh,em:em};
  tpRefresh();
  var dates=weekDates(wOff);
  document.getElementById('tpInfo').textContent=fmt(dates[di])+' ('+DAYKO[di]+') — '+(r+1)+'번째 줄';
  document.getElementById('tpModal').classList.add('open');
}
function tpClose() { document.getElementById('tpModal').classList.remove('open'); }

function tpRefresh() {
  /* div → input 으로 변경됐으므로 .value 사용 */
  document.getElementById('dsh').value=pad(tpVals.sh);
  document.getElementById('dsm').value=pad(tpVals.sm);
  document.getElementById('deh').value=pad(tpVals.eh);
  document.getElementById('dem').value=pad(tpVals.em);
  document.getElementById('tpPreview').textContent=
    pad(tpVals.sh)+':'+pad(tpVals.sm)+' ~ '+pad(tpVals.eh)+':'+pad(tpVals.em);
}
function pad(n){ return String(n).padStart(2,'0'); }

function adjDial(id, dir) {
  /* dir: +1=증가(▲), -1=감소(▼) */
  if (id==='sh'||id==='eh') {
    tpVals[id]=(tpVals[id]+dir+24)%24;
  } else {
    /* 분: 5분 단위, +60으로 음수 wrap 방지 */
    tpVals[id]=(tpVals[id]+dir*5+60)%60;
  }
  tpRefresh();
}

/* ── 터치/마우스 이중 발화 방지 ─────────────────
   touchstart 에서 preventDefault() → 후속 mousedown 차단
   버튼은 data-id / data-dir 속성으로 제어              */
var repeatTimer=null, repeatInterval=null;

function startRepeat(id, dir) {
  stopRepeat();
  adjDial(id, dir);
  repeatTimer=setTimeout(function(){
    repeatInterval=setInterval(function(){ adjDial(id,dir); }, 130);
  }, 450);
}
function stopRepeat() {
  clearTimeout(repeatTimer); clearInterval(repeatInterval);
  repeatTimer=null; repeatInterval=null;
}

/* ── 다이얼 버튼 이벤트 바인딩 (페이지 로드 후 한 번) ── */
function setupDialBtns() {
  document.querySelectorAll('.dial-up, .dial-dn').forEach(function(btn) {
    var id  = btn.dataset.id;
    var dir = parseInt(btn.dataset.dir);

    /* 터치: preventDefault로 mousedown 차단 */
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startRepeat(id, dir);
    }, {passive: false});
    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      stopRepeat();
    }, {passive: false});

    /* 마우스 (비터치 환경) */
    btn.addEventListener('mousedown', function(e) { startRepeat(id, dir); });
    btn.addEventListener('mouseup',   stopRepeat);
    btn.addEventListener('mouseleave',stopRepeat);
  });

  /* ── 숫자 직접 입력 ── */
  var dialCfg = [
    {id:'sh', elId:'dsh', isMin:false},
    {id:'sm', elId:'dsm', isMin:true },
    {id:'eh', elId:'deh', isMin:false},
    {id:'em', elId:'dem', isMin:true }
  ];
  dialCfg.forEach(function(cfg) {
    var el = document.getElementById(cfg.elId);
    el.addEventListener('change', function() {
      var v = parseInt(this.value);
      if (isNaN(v)) { v = 0; }
      if (cfg.isMin) {
        v = Math.max(0, Math.min(59, v));
        v = Math.round(v / 5) * 5;   /* 5분 단위로 스냅 */
        if (v >= 60) v = 55;
      } else {
        v = Math.max(0, Math.min(23, v));
      }
      tpVals[cfg.id] = v;
      tpRefresh();
    });
  });
}

function tpDone() {
  var val=pad(tpVals.sh)+':'+pad(tpVals.sm)+'~'+pad(tpVals.eh)+':'+pad(tpVals.em);
  lsSet(skey(tpDk,tpR,'t'), val);
  document.querySelectorAll('.time-btn').forEach(function(btn){
    if (btn.dataset.dk===tpDk && parseInt(btn.dataset.r)===tpR) {
      btn.innerHTML=fmtTimeBtnHtml(val);
      btn.classList.remove('empty'); btn.classList.add('has-val');
    }
  });
  highlightActive();
  tpClose();
}
function tpReset() {
  lsDel(skey(tpDk,tpR,'t'));
  document.querySelectorAll('.time-btn').forEach(function(btn){
    if (btn.dataset.dk===tpDk && parseInt(btn.dataset.r)===tpR) {
      btn.innerHTML='클릭';
      btn.classList.remove('has-val'); btn.classList.add('empty');
    }
  });
  highlightActive();
  tpClose();
}

/* ─────────────────────── 운행 중 하이라이트 ─────────── */
function highlightActive() {
  /* 기존 하이라이트 전부 제거 */
  document.querySelectorAll('td.time-active').forEach(function(td) {
    td.classList.remove('time-active');
  });

  /* 오늘 날짜만 검사 */
  var now = new Date();
  var todayKey = dkey(now);
  var curMins = now.getHours() * 60 + now.getMinutes();

  for (var r = 0; r < NROWS; r++) {
    var val = lsGet(skey(todayKey, r, 't'));
    if (!val) continue;
    var m = val.match(/(\d{1,2}):(\d{2})~(\d{1,2}):(\d{2})/);
    if (!m) continue;
    var startMins = parseInt(m[1]) * 60 + parseInt(m[2]);
    var endMins   = parseInt(m[3]) * 60 + parseInt(m[4]);
    /* 입차 체크됐으면 운행 종료로 간주 → 하이라이트 제외 */
    if (lsGet(skey(todayKey, r, 'i')) === 'true') continue;
    /* 현재 시각이 출발~도착 사이이면 해당 행 4셀 모두 파란색 */
    if (curMins >= startMins && curMins < endMins) {
      document.querySelectorAll(
        'td[data-dk="' + todayKey + '"][data-r="' + r + '"]'
      ).forEach(function(td) { td.classList.add('time-active'); });
    }
  }
}

/* ─────────────────────── 초기 실행 ─────────────────── */
buildTable();
highlightActive();
setupDialBtns(); /* 다이얼 버튼 이벤트 등록 */

if (screen.orientation&&screen.orientation.lock) {
  screen.orientation.lock('landscape').catch(function(){});
}

/* 30초마다 하이라이트 갱신 */
setInterval(highlightActive, 30000);

(function sched(){
  var n=new Date();
  var next=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1,0,0,3);
  setTimeout(function(){ if(wOff===0){ buildTable(); highlightActive(); } sched(); }, next-n);
}());

document.addEventListener('visibilitychange', function(){
  if (!document.hidden && wOff===0){ buildTable(); highlightActive(); }
});
</script>
